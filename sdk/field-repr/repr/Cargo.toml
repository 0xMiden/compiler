[package]
name = "miden-field-repr"
description = "Serialization/deserialization for felt representation"
version = "0.12.0"
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
edition.workspace = true

[lib]
crate-type = ["rlib"]
test = false
doctest = false

[dependencies]
miden-field-repr-derive = { path = "../derive", version = "0.12.0" }
miden-field = { workspace = true, default-features = false }

[features]
default = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(miden)"] }

[package.metadata.docs.rs]
default-target = "x86_64-unknown-linux-gnu"
additional-targets = ["wasm32-unknown-unknown", "wasm32-wasip1", "wasm32-wasip2"]
