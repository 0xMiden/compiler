[package]
name = "miden-base-sys"
description = "Miden rollup Rust bingings and MASM library"
version = "0.11.0"
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
categories.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
edition.workspace = true
build = "build.rs"
links = "miden_base_sys_stubs"

[dependencies]
miden-stdlib-sys = { version = "0.11.0", path = "../stdlib-sys" }
miden-field-repr = { version = "0.11.0", path = "../field-repr/repr" }

[features]
default = []

[package.metadata.docs.rs]
default-target = "x86_64-unknown-linux-gnu"
additional-targets = ["wasm32-unknown-unknown", "wasm32-wasip1", "wasm32-wasip2"]
