[package]
name = "cargo-miden"
description = "A cargo extension to build Miden projects"
version.workspace = true
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
categories.workspace = true
keywords.workspace = true
license.workspace = true
readme.workspace = true
edition.workspace = true
autotests = false                                         # disable autodiscovery of tests

[lib]
doctest = false

[[bin]]
name = "cargo-miden"

[[test]]
name = "integration"
path = "tests/mod.rs"

[dependencies]
miden-package-registry = { workspace = true, features = ["std"] }
miden-mast-package = { workspace = true, features = ["std"] }
midenc-compile = { workspace = true, features = ["std"] }
midenc-hir = { workspace = true, features = ["std"] }
midenc-session.workspace = true
midenc-log.workspace = true
log.workspace = true
clap.workspace = true
anyhow.workspace = true
path-absolutize = "^3.1"
serde.workspace = true
serde_json = { workspace = true, features = ["std"] }
toml_edit = { version = "^0.25", features = ["serde"] }
semver.workspace = true
liquid = "0.26"
tempfile.workspace = true
walkdir = "2.5"

[dev-dependencies]
# NOTE: Use local paths for dev-only dependency to avoid relying on crates.io during packaging
miden-mast-package.workspace = true
